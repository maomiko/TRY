# ==========================================
# L2Seg 25-Dim CVRP100 全局配置文件
# ==========================================

# ------------------------------------------
# 1. 环境与物理参数 (Env Params)
# ------------------------------------------
env_params:
  problem: "cvrp"
  problem_size: 100               # 客户节点数量 (不含车场)
  num_processes: 1                # 并行进程数 (训练/收集数据时建议设为 1)
  num_nodes_to_remove: 15         # 每次 Destroy 破坏的节点数 (不稳定点数量)
  beta: 0.1                       # 启发式算子的随机扰动参数
  insert_in_new_tours_only: false
  recreate_n: 1

# ------------------------------------------
# 2. 核心大模型参数 (Model Params - 25维双脑架构)
# ------------------------------------------
model_params:
  problem: "cvrp"
  problem_size: 100
  embedding_dim: 128
  encoder_layer_num: 3            # 主干 Transformer 编码器层数
  head_num: 8                     # 多头注意力头数
  qkv_dim: 16
  decoder_layer_num: 4            # AR 局部解码器层数
  ff_hidden_dim: 512              # 前馈网络隐藏层维度
  tour_layer: true                # 是否启用路径特征掩码
  message_passing_layer_num: 3    # GNN 消息传递层数 (拓扑特征)
  encoder_layer_num_2: 3          # 辅助编码器层数
  poly_embedding_dim: 128
  z_dim: 16
  sqrt_embedding_dim: 11.31       # math.sqrt(128)，用于缩放点积注意力
  logit_clipping: 10.0            # 防止 logits 爆炸的裁剪阈值
  eval_type: "argmax"             # 推理模式 (贪心策略)

# ------------------------------------------
# 3. 搜索与评测引擎参数 (Tester Params)
# ------------------------------------------
tester_params:
  use_cuda: true
  cuda_device_num: 0              # 使用的 GPU 编号
  
  # 👑 核心阶段控制开关
  # True: 使用 C++ 启发式专家收集数据 (训练前)
  # False: 使用 AI 模型瞬间锁定不稳定点 (训练后)
  use_baseline_destroy: true      

  # 模拟退火 (Simulated Annealing) 超参数
  SA_delta: 15
  SA_start_T: 0.1
  SA_final_T: 0.001
  softmax_temp: 1.0
  aug_factor: 8                   # 数据增强因子 (同时并行搜寻多少个解)
  
  nb_instances: 100               # 评测多少个图
  nb_iterations: 1000             # 每个图最多搜索多少次迭代
  max_runtime: 0                  # 最大运行时间 (0 表示不限制，按迭代次数走)
  rollout_size: 1                 # 每次生成的候选解数量

  # 测试数据集加载路径
  test_data_load:
    enable: true
    use_pkl_file: true
    filename: "data/cvrp/vrp100_test_seed1234.pkl"

  # AI 模型权重加载配置 (当 use_baseline_destroy 为 False 时生效)
  model_load: []                  
  # 💡 训练完成后，你可以将 model_load 改为下面这样来让 AI 接管：
  # model_load:
  #   - path: "results/l2seg_dataset/checkpoints"
  #     epoch: 19
  #     node_to_remove: 15