env_params:
  problem: "cvrp"
  problem_size: 100
  num_nodes_to_remove: 15
  iterations_per_instance: 25   # 【修改点 1】环境迭代次数对齐 25 步
  recreate_n: 5
  beta: 0
  insert_in_new_tours_only: True
  num_processes: 0
  generator_params:
    use_X_generator: False
    rootPos: 2
    custPos: 2
    demandType: 2
    avgRouteSize: 3
  starting_solution_params:
    nb_iterations: 50
    nb_nodes_ratio: 0.15

tester_params:
  use_cuda: True
  cuda_device_num: 0
  
  # 指向你刚刚上传的测试集文件
  test_data_load:
    enable: True
    filename: 'data/cvrp/vrp100_test_seed1234.pkl'
  
  # 【试飞设置】先跑 10 个实例试试水，确认前面的 IndexError 已经修复后，再改回 1000
  nb_instances: 10
  
  # 必须为 True，强制使用纯启发式算法生成 Ground Truth 标签
  use_baseline_destroy: True   
  model_load: []               
  
  # ==========================================
  # 精准复现 LKH 行为的 SA 搜索参数
  # ==========================================
  aug_factor: 1
  nb_iterations: 25            # 【修改点 2】严格对齐原作者的 25 个中间步骤
  rollout_size: 40             # 【修改点 3】单步探索宽度：25步 * 40次 = 1000次，完美还原 MAX_TRIALS
  max_runtime: 0
  
  SA_start_T: 100
  SA_final_T: 1
  SA_delta: 0.1