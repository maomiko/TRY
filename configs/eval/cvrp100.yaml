# ==========================================
# L2Seg 25-Dim CVRP 配置文件 (驱动 eval.py 与 train.py)
# ==========================================

# ------------------------------------------
# 1. 环境参数 (Env Params)
# ------------------------------------------
env_params:
  problem: "cvrp"
  problem_size: 100               # 节点数量
  num_processes: 6                # 推荐设为 1 以确保数据收集的顺序性
  num_nodes_to_remove: 15         # 每次破坏的节点数 (k)
  beta: 0.1                       # 随机性因子
  max_vehicles: 50                
  insert_in_new_tours_only: false
  recreate_n: 1

# ------------------------------------------
# 2. 25维双脑模型参数 (Model Params)
# ------------------------------------------
# 注意：train.py 会读取这里来初始化网络，eval.py 加载权重时也会校验这些维度
model_params:
  problem: "cvrp"
  problem_size: 100
  embedding_dim: 128
  encoder_layer_num: 3            # NAR 编码器层数
  head_num: 8
  qkv_dim: 16
  decoder_layer_num: 4            # AR 解码器层数
  ff_hidden_dim: 512
  tour_layer: true                # 开启路径掩码特征
  message_passing_layer_num: 3    # GNN 拓扑特征层数
  encoder_layer_num_2: 3
  poly_embedding_dim: 128
  z_dim: 16
  sqrt_embedding_dim: 11.31       # sqrt(128)
  logit_clipping: 10.0
  eval_type: "argmax"

# ------------------------------------------
# 3. 搜索与评测引擎参数 (Tester Params)
# ------------------------------------------
tester_params:
  use_cuda: true
  cuda_device_num: 0
  
  # 【关键开关】
  # 【关键开关】
  # 【关键开关】
  # 【关键开关】
  # true: 运行专家模式（LKH-3），收集并保存训练标签
  # false: 运行 AI 模式，加载下方指定的 checkpoint 进行推理

  use_baseline_destroy: true      
  # 【关键开关】
  # 【关键开关】
  # 【关键开关】

  # 模拟退火 (SA) 设置
  SA_delta: 15
  SA_start_T: 0.1
  SA_final_T: 0.001
  softmax_temp: 1.0
  aug_factor: 1                   # 并行增强因子
  
  nb_instances: 1              # 测试图的数量
  nb_iterations: 5             # 每个图的最大迭代次数
  max_runtime: 0                  # 运行限时 (0 为不限制)
  rollout_size: 1

  # 测试数据集路径
  test_data_load:
    enable: false
    use_pkl_file: true
    filename: "data/cvrp/vrp100_test_seed1234.pkl"
  # 👑 新增：我自己的官方数据集接口
  official_vrp_path: "data/X-n101-k25.vrp"

  # AI 模型加载配置 (当 use_baseline_destroy 为 false 时启用)
  model_load:
    - path: "results/l2seg_dataset/checkpoints" # 权重存放文件夹
      epoch: 19                                 # 加载第几个 epoch
      node_to_remove: 15